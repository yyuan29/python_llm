name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
 build:
    runs-on: ubuntu-latest  # VM to run your workflow

    env:
      # Load your GitHub secret into an environment variable
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
 test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python ${{matrix.python}}
        uses: actions/setup-python@v2
        with:
         python-version: ${{matrix.python}}

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage codecov

      # 4️⃣ Run tests with coverage
      - name: Run tests and collect coverage
        run: |
          coverage run -m pytest chat.py --doctest-modules
          coverage report -m

      # 5️⃣ Upload coverage to Codecov for badge
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python_llm
          fail_ci_if_error: true