name: Python CI  # name of the workflow

# Trigger workflow on pushes or pull requests to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest  # VM to run your workflow

    env:
      # Load your GitHub secret into an environment variable
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      # Step 1: Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # or your preferred version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Step 4: Run your script
      - name: Run Python script
        run: python workflow/test_integration.py # replace with your script