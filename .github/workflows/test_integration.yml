name: integration-tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-llm
      - run: |
          chat <<'EOF'
          I am bob.
          What is my name?
          EOF
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}