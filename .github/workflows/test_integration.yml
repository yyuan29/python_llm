name: integration_test
on:
  push:
    branches: ['*']
jobs:
  build:
    runs-on: ubuntu-latest  # VM to run your workflow

    env:
      # Load your GitHub secret into an environment variable
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Step 4: Install your package
      - name: Install package
        run: pip install .

      # Step 5: Run simple integration test
      - name: Run chat integration test
        run: |
          python chat.py chat <<'EOF'
          I am bob.
          What is my name?
          EOF